<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Nokia Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --lcd-bg: #9ea792;
            --lcd-dark: #2b331f;
            --nokia-body: #1a1a1a;
            --nokia-case: #2d2d2d;
        }

        body {
            background-color: #e0e0e0;
            font-family: 'VT323', monospace;
            overflow: hidden;
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }

        /* CRT Effect */
        .crt-screen {
            background-color: var(--lcd-bg);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Phone Body */
        .phone-case {
            background: var(--nokia-case);
            box-shadow:
                -5px -5px 15px rgba(255,255,255,0.1),
                10px 10px 20px rgba(0,0,0,0.5),
                inset 2px 2px 5px rgba(255,255,255,0.05);
        }

        /* D-Pad */
        .d-pad-btn {
            background: #111;
            box-shadow:
                2px 2px 5px rgba(0,0,0,0.5),
                -1px -1px 2px rgba(255,255,255,0.1);
            transition: all 0.1s;
        }
        .d-pad-btn:active {
            transform: translate(1px, 1px);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* Scanline Animation */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            position: absolute;
            z-index: 3;
            animation: scanline 6s linear infinite;
            pointer-events: none;
        }

        /* Pixel Font sizing */
        .pixel-text {
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center bg-neutral-300">

    <!-- The Phone Container -->
    <div class="phone-case relative w-[340px] h-[700px] rounded-[40px] border-4 border-neutral-800 flex flex-col items-center p-4 select-none">

        <!-- Speaker Grill -->
        <div class="w-16 h-2 bg-black rounded-full mb-6 mt-2 opacity-80"></div>

        <!-- Screen Bezel -->
        <div class="bg-[#4a4a4a] p-4 rounded-t-xl rounded-b-lg w-full mb-8 border-b-4 border-black/20 shadow-inner">

            <!-- Branding -->
            <div class="text-center mb-1">
                <span class="text-[#ccc] font-bold text-xs tracking-widest uppercase">Nokio</span>
            </div>

            <!-- Actual LCD Screen -->
            <div class="crt-screen w-full aspect-[11/9] border-4 border-[#333] rounded-sm relative">
                <div class="scanline"></div>

                <!-- Canvas -->
                <canvas id="gameCanvas" class="block w-full h-full image-pixelated"></canvas>

                <!-- UI Overlay -->
                <div id="ui-layer" class="absolute inset-0 flex flex-col justify-between p-2 z-10 text-[#2b331f]">
                    <div class="flex justify-between text-xl font-bold pixel-text">
                        <span id="scoreDisplay">Score: 0</span>
                        <span id="highScoreDisplay">Hi: 0</span>
                    </div>

                    <!-- Start Screen -->
                    <div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-[#9ea792]/80 backdrop-blur-[1px]">
                        <h1 class="text-4xl font-bold mb-2 tracking-tighter">SNAKE</h1>
                        <p class="text-lg animate-pulse">PRESS START</p>
                    </div>

                    <!-- Game Over Screen -->
                    <div id="gameOverScreen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-[#9ea792]/90 backdrop-blur-[2px]">
                        <h1 class="text-3xl font-bold mb-1">GAME OVER</h1>
                        <p class="text-xl mb-2" id="finalScore">Score: 0</p>
                        <p class="text-sm animate-pulse">TRY AGAIN</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Keypad Area -->
        <div class="flex-1 w-full flex flex-col items-center justify-center gap-4">

            <!-- D-Pad -->
            <div class="relative w-40 h-40">
                <!-- Up -->
                <button id="btn-up" class="d-pad-btn absolute top-0 left-1/2 -translate-x-1/2 w-12 h-14 rounded-t-lg flex items-center justify-center text-neutral-600">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
                </button>
                <!-- Left -->
                <button id="btn-left" class="d-pad-btn absolute left-0 top-1/2 -translate-y-1/2 w-14 h-12 rounded-l-lg flex items-center justify-center text-neutral-600">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M4 12l8-8v16z"/></svg>
                </button>
                <!-- Center -->
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-[#111] rounded-full border-2 border-[#333]"></div>
                <!-- Right -->
                <button id="btn-right" class="d-pad-btn absolute right-0 top-1/2 -translate-y-1/2 w-14 h-12 rounded-r-lg flex items-center justify-center text-neutral-600">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M20 12l-8 8V4z"/></svg>
                </button>
                <!-- Down -->
                <button id="btn-down" class="d-pad-btn absolute bottom-0 left-1/2 -translate-x-1/2 w-12 h-14 rounded-b-lg flex items-center justify-center text-neutral-600">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 20l8-8H4z"/></svg>
                </button>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-between w-48 mt-2">
                <button id="btn-start" class="bg-[#222] text-[#666] font-bold py-2 px-4 rounded-full shadow-md active:translate-y-1 border-b-4 border-black active:border-b-0 text-sm tracking-widest">START</button>
                <button id="btn-select" class="bg-[#222] text-[#666] font-bold py-2 px-4 rounded-full shadow-md active:translate-y-1 border-b-4 border-black active:border-b-0 text-sm tracking-widest">SELECT</button>
            </div>

            <!-- Numpad (Visual Only) -->
            <div class="grid grid-cols-3 gap-2 mt-4 opacity-50">
                <div class="w-8 h-8 bg-[#111] rounded-full"></div>
                <div class="w-8 h-8 bg-[#111] rounded-full"></div>
                <div class="w-8 h-8 bg-[#111] rounded-full"></div>
                <div class="w-8 h-8 bg-[#111] rounded-full"></div>
                <div class="w-8 h-8 bg-[#111] rounded-full"></div>
                <div class="w-8 h-8 bg-[#111] rounded-full"></div>
            </div>
        </div>
    </div>

    <script>
        /**
         * NOKIA SNAKE GAME LOGIC
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const scoreEl = document.getElementById('scoreDisplay');
        const highScoreEl = document.getElementById('highScoreDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');

        // Game Constants
        const GRID_SIZE = 20; // Number of cells across
        const CELL_SIZE = canvas.width / GRID_SIZE; // Will calculate dynamically on resize
        const GAME_SPEED = 100; // ms per frame

        // Game State
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoopId;
        let lastRenderTime = 0;
        let isGameRunning = false;
        let isGameOver = false;

        // Audio Context (Simple Beeps)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'eat') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'move') {
                // Very subtle click
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        // Initialization
        function init() {
            // Set canvas resolution
            canvas.width = GRID_SIZE;
            canvas.height = GRID_SIZE * (9/11); // Aspect ratio approx 11:9

            // Handle high DPI
            // const dpr = window.devicePixelRatio || 1;
            // canvas.style.width = canvas.width + 'px';
            // canvas.style.height = canvas.height + 'px';
            // canvas.width *= dpr;
            // canvas.height *= dpr;
            // ctx.scale(dpr, dpr);

            highScoreEl.innerText = `Hi: ${highScore}`;
            resetGame();

            // Start Loop
            window.requestAnimationFrame(mainLoop);
        }

        function resetGame() {
            snake = [
                { x: 5, y: 7 },
                { x: 4, y: 7 },
                { x: 3, y: 7 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreEl.innerText = `Score: ${score}`;
            placeFood();
            isGameOver = false;
            isGameRunning = false;
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }

        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            isGameOver = false;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            lastRenderTime = performance.now();
        }

        function mainLoop(currentTime) {
            window.requestAnimationFrame(mainLoop);

            const secondsSinceLastRender = (currentTime - lastRenderTime) / 1000;
            if (secondsSinceLastRender < GAME_SPEED / 1000) return;

            lastRenderTime = currentTime;

            if (isGameRunning) {
                update();
            }
            draw();
        }

        function update() {
            direction = nextDirection;

            // Calculate new head position
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Check Wall Collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= canvas.height) {
                gameOver();
                return;
            }

            // Check Self Collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head); // Add new head

            // Check Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = `Score: ${score}`;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.innerText = `Hi: ${highScore}`;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                playSound('eat');
                placeFood();
            } else {
                snake.pop(); // Remove tail
                // playSound('move'); // Optional: can be annoying if too frequent
            }
        }

        function placeFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * GRID_SIZE);
                food.y = Math.floor(Math.random() * canvas.height);
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function gameOver() {
            isGameRunning = false;
            isGameOver = true;
            playSound('die');
            finalScoreEl.innerText = `Score: ${score}`;
            gameOverScreen.classList.remove('hidden');
        }

        function draw() {
            // Clear Screen (LCD Background color)
            ctx.fillStyle = '#9ea792';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            ctx.fillStyle = '#2b331f';
            snake.forEach((segment, index) => {
                // Draw slightly smaller than grid for "pixel" look
                ctx.fillRect(segment.x, segment.y, 1, 1);

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#9ea792'; // Eye color
                    // Simple logic to place eyes based on direction
                    if (direction.x === 1) { // Right
                        ctx.fillRect(segment.x + 0.6, segment.y + 0.2, 0.2, 0.2);
                        ctx.fillRect(segment.x + 0.6, segment.y + 0.6, 0.2, 0.2);
                    } else if (direction.x === -1) { // Left
                        ctx.fillRect(segment.x + 0.2, segment.y + 0.2, 0.2, 0.2);
                        ctx.fillRect(segment.x + 0.2, segment.y + 0.6, 0.2, 0.2);
                    } else if (direction.y === -1) { // Up
                        ctx.fillRect(segment.x + 0.2, segment.y + 0.2, 0.2, 0.2);
                        ctx.fillRect(segment.x + 0.6, segment.y + 0.2, 0.2, 0.2);
                    } else { // Down
                        ctx.fillRect(segment.x + 0.2, segment.y + 0.6, 0.2, 0.2);
                        ctx.fillRect(segment.x + 0.6, segment.y + 0.6, 0.2, 0.2);
                    }
                    ctx.fillStyle = '#2b331f'; // Reset color
                }
            });

            // Draw Food
            ctx.fillStyle = '#2b331f';
            // Draw a "plus" shape or square
            ctx.fillRect(food.x, food.y, 1, 1);
        }

        // Input Handling
        function handleInput(key) {
            if (!isGameRunning && !isGameOver && key === 'start') {
                startGame();
                return;
            }

            if (isGameOver && key === 'start') {
                resetGame();
                startGame();
                return;
            }

            if (!isGameRunning) return;

            switch(key) {
                case 'up':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        // Event Listeners
        document.getElementById('btn-up').addEventListener('click', () => handleInput('up'));
        document.getElementById('btn-down').addEventListener('click', () => handleInput('down'));
        document.getElementById('btn-left').addEventListener('click', () => handleInput('left'));
        document.getElementById('btn-right').addEventListener('click', () => handleInput('right'));
        document.getElementById('btn-start').addEventListener('click', () => handleInput('start'));

        // Keyboard Support
        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': handleInput('up'); break;
                case 'ArrowDown': handleInput('down'); break;
                case 'ArrowLeft': handleInput('left'); break;
                case 'ArrowRight': handleInput('right'); break;
                case 'Enter': handleInput('start'); break;
            }
        });

        // Start
        init();

    </script>
</body>
</html>
